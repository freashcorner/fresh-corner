<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 100" width="380" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A4731"/>
      <stop offset="100%" style="stop-color:#2ECC71"/>
    </linearGradient>
    <linearGradient id="lf1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5EE88A"/>
      <stop offset="100%" style="stop-color:#27AE60"/>
    </linearGradient>
    <linearGradient id="lf2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4CD964"/>
      <stop offset="100%" style="stop-color:#1E8449"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon box -->
  <rect x="6" y="8" width="84" height="84" rx="22" fill="url(#bg)"/>

  <!-- Stem -->
  <path d="M50 82 Q48 62 50 22" stroke="rgba(255,255,255,0.55)" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- 6 leaves -->
  <!-- Leaf 1 bottom-left -->
  <path d="M50 70 Q26 63 22 42 Q50 48 50 70Z" fill="url(#lf1)"/>
  <path d="M50 70 Q34 58 22 42" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Leaf 2 bottom-right -->
  <path d="M50 62 Q74 54 76 32 Q48 38 50 62Z" fill="url(#lf2)"/>
  <path d="M50 62 Q65 48 76 32" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Leaf 3 mid-left -->
  <path d="M50 52 Q28 44 26 24 Q50 30 50 52Z" fill="url(#lf1)" opacity="0.92"/>
  <path d="M50 52 Q37 38 26 24" stroke="rgba(255,255,255,0.18)" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Leaf 4 mid-right -->
  <path d="M50 44 Q70 36 72 16 Q48 22 50 44Z" fill="url(#lf2)" opacity="0.9"/>
  <path d="M50 44 Q63 30 72 16" stroke="rgba(255,255,255,0.18)" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Leaf 5 upper-left -->
  <path d="M50 34 Q34 24 36 10 Q54 16 50 34Z" fill="url(#lf1)" opacity="0.93"/>
  <path d="M50 34 Q41 22 36 10" stroke="rgba(255,255,255,0.16)" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Leaf 6 upper-right -->
  <path d="M50 26 Q64 16 64 4 Q46 10 50 26Z" fill="url(#lf2)" opacity="0.9"/>
  <path d="M50 26 Q59 14 64 4" stroke="rgba(255,255,255,0.16)" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Bengali text -->
  <text x="106" y="50"
    font-family="'Hind Siliguri', 'Noto Sans Bengali', sans-serif"
    font-size="32"
    font-weight="700"
    fill="#2ECC71"
    filter="url(#glow)">ফ্রেশ কর্নার</text>

  <!-- Tagline -->
  <text x="108" y="72"
    font-family="'Hind Siliguri', 'Noto Sans Bengali', sans-serif"
    font-size="12"
    fill="rgba(255,255,255,0.4)"
    letter-spacing="1">তাজা • বিশ্বস্ত • দ্রুত</text>

  <rect x="106" y="56" width="200" height="1.5" rx="1" fill="#2ECC71" opacity="0.3"/>
</svg>
