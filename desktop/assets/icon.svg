<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#1A4731"/>
      <stop offset="100%" style="stop-color:#2ECC71"/>
    </linearGradient>
    <linearGradient id="lf1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5EE88A"/>
      <stop offset="100%" style="stop-color:#27AE60"/>
    </linearGradient>
    <linearGradient id="lf2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4CD964"/>
      <stop offset="100%" style="stop-color:#1E8449"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="2" y="2" width="96" height="96" rx="26" fill="url(#bg)"/>

  <!-- Central stem -->
  <path d="M50 88 Q48 66 50 24" stroke="rgba(255,255,255,0.55)" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Leaf 1 — bottom left (largest) -->
  <path d="M50 74 Q22 67 18 44 Q50 50 50 74Z" fill="url(#lf1)"/>
  <path d="M50 74 Q32 62 18 44" stroke="rgba(255,255,255,0.22)" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Leaf 2 — bottom right (largest) -->
  <path d="M50 66 Q78 58 80 34 Q48 42 50 66Z" fill="url(#lf2)"/>
  <path d="M50 66 Q67 52 80 34" stroke="rgba(255,255,255,0.22)" stroke-width="1.2" fill="none" stroke-linecap="round"/>

  <!-- Leaf 3 — mid left -->
  <path d="M50 56 Q26 48 24 26 Q50 32 50 56Z" fill="url(#lf1)" opacity="0.92"/>
  <path d="M50 56 Q36 44 24 26" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Leaf 4 — mid right -->
  <path d="M50 48 Q72 40 74 18 Q48 24 50 48Z" fill="url(#lf2)" opacity="0.9"/>
  <path d="M50 48 Q64 34 74 18" stroke="rgba(255,255,255,0.2)" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Leaf 5 — upper left -->
  <path d="M50 38 Q32 28 34 12 Q54 18 50 38Z" fill="url(#lf1)" opacity="0.93"/>
  <path d="M50 38 Q40 26 34 12" stroke="rgba(255,255,255,0.18)" stroke-width="1" fill="none" stroke-linecap="round"/>

  <!-- Leaf 6 — upper right -->
  <path d="M50 30 Q66 20 66 6 Q46 12 50 30Z" fill="url(#lf2)" opacity="0.9"/>
  <path d="M50 30 Q60 18 66 6" stroke="rgba(255,255,255,0.18)" stroke-width="1" fill="none" stroke-linecap="round"/>
</svg>
